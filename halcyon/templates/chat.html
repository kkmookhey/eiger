<!doctype html>
<title>Halo — Halcyon assistant</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
  #log { border: 1px solid #ccc; border-radius: 8px; padding: 1rem; height: 380px;
         overflow-y: auto; background: #fafafa; }
  #log p { margin: .35rem 0; line-height: 1.4; }
  .you { color: #0b5cad; } .halo { color: #222; } .sys { color: #888; font-style: italic; }
  .controls { margin: .5rem 0; }
  #f { display: flex; gap: .5rem; margin-top: .6rem; }
  #msg { flex: 1; padding: .6rem .7rem; font-size: 1rem; border: 1px solid #bbb;
         border-radius: 6px; }
  #f button { padding: .6rem 1.1rem; font-size: 1rem; cursor: pointer; border-radius: 6px; }
  #f button[disabled] { opacity: .5; cursor: default; }
  #rag { margin-top: 1.5rem; }
  #kbtext { width: 100%; box-sizing: border-box; padding: .6rem .7rem; font-size: 1rem;
            border: 1px solid #bbb; border-radius: 6px; font-family: inherit; }
  #ragask { display: flex; gap: .5rem; margin-top: .6rem; }
  #askq { flex: 1; padding: .6rem .7rem; font-size: 1rem; border: 1px solid #bbb;
          border-radius: 6px; }
  #ragout { border: 1px solid #ccc; border-radius: 8px; padding: 1rem; margin-top: .6rem;
            background: #fafafa; min-height: 1.4em; }
  #m4 { margin-top: 1.5rem; }
  #m4hash, #m4pkg { padding: .6rem .7rem; font-size: 1rem; border: 1px solid #bbb;
                     border-radius: 6px; }
  #m4status { display: block; margin-top: .6rem; }
</style>
<h1>Halo</h1>
<div id="cfg" data-encoding="{{ output_encoding }}"></div>
<div id="greeting">Welcome, <span id="dn">{{ display_name_html | safe }}</span></div>
<div class="controls">
  <label>Model:
    <select id="provider">
      <option value="local">Local (Ollama)</option>
      <option value="remote">Remote (BYOK)</option>
    </select>
  </label>
  <span id="remote" style="display:none">
    <select id="rprovider"><option>openai</option><option>anthropic</option></select>
    <input id="model" placeholder="model (e.g. gpt-4o)" />
    <input id="key" type="password" placeholder="API key (not stored server-side)" />
  </span>
  <span id="profile">
    <input id="dname" placeholder="Display name" />
    <button id="setname" type="button">Set name</button>
  </span>
</div>
<div id="log"></div>
<form id="f">
  <input id="msg" type="text" placeholder="Message Halo…" autocomplete="off" autofocus />
  <button id="send" type="submit">Send</button>
</form>

<div id="rag">
  <h2>Knowledge base (RAG)</h2>
  <textarea id="kbtext" rows="4" placeholder="Submit a note to the community KB…"></textarea>
  <div class="controls">
    <button id="kbsubmit" type="button">Submit to community KB</button>
    <span id="kbstatus"></span>
  </div>
  <div id="ragask">
    <input id="askq" type="text" placeholder="Ask Halo (RAG)…" autocomplete="off" />
    <button id="askbtn" type="button">Ask Halo (RAG)</button>
  </div>
  <div id="ragout"></div>
</div>

<div id="m4">
  <h2>M4 — Supply-chain audit</h2>
  <p>Audit <code>labs/m4/</code>. Run <code>python -m halcyon.scan_artifact labs/m4/artifacts/*</code>
     to find the poisoned model; check <code>labs/m4/requirements-vulnerable.txt</code> for a
     vulnerable pin. Submit your findings below.</p>
  <div class="controls">
    <input id="m4hash" type="text" placeholder="Artifact sha256" />
    <button id="m4hashbtn" type="button">Submit artifact</button>
  </div>
  <div class="controls">
    <input id="m4pkg" type="text" placeholder="Vulnerable package" />
    <button id="m4pkgbtn" type="button">Submit package</button>
  </div>
  <span id="m4status"></span>
</div>

<script nonce="{{ nonce }}">
  const sid = new URLSearchParams(location.search).get("session") || "dev";
  const log = document.getElementById("log");
  const provSel = document.getElementById("provider");
  const msgEl = document.getElementById("msg");
  const sendBtn = document.getElementById("send");
  provSel.onchange = () => {
    document.getElementById("remote").style.display =
      provSel.value === "remote" ? "inline" : "none";
  };
  document.getElementById("setname").onclick = () => {
    fetch("/api/profile", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        session_id: sid,
        display_name: document.getElementById("dname").value,
      }),
    }).then(() => location.reload());
  };
  function line(cls, who, text) {
    const p = document.createElement("p");
    p.className = cls; p.textContent = who + ": " + text; log.appendChild(p);
    log.scrollTop = log.scrollHeight;
    return p;
  }
  document.getElementById("f").onsubmit = async (e) => {
    e.preventDefault();
    const msg = msgEl.value.trim();
    if (!msg) return;
    line("you", "You", msg);
    msgEl.value = "";
    sendBtn.disabled = true;
    const pending = line("sys", "Halo", "typing…");
    const body = { session_id: sid, message: msg };
    if (provSel.value === "remote") {
      body.provider = document.getElementById("rprovider").value;
      body.model = document.getElementById("model").value;
      body.api_key = document.getElementById("key").value;
    }
    try {
      const r = await fetch("/api/chat", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await r.json();
      pending.remove();
      line("halo", "Halo", data.reply ?? ("error: " + JSON.stringify(data)));
    } catch (err) {
      pending.remove();
      line("sys", "Halo", "request failed — " + err);
    } finally {
      sendBtn.disabled = false;
      msgEl.focus();
    }
  };
  msgEl.focus();

  const kbtext = document.getElementById("kbtext");
  const kbsubmit = document.getElementById("kbsubmit");
  const kbstatus = document.getElementById("kbstatus");
  kbsubmit.onclick = async () => {
    const text = kbtext.value.trim();
    if (!text) return;
    kbsubmit.disabled = true;
    kbstatus.textContent = "";
    try {
      await fetch("/api/kb", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sid, text: kbtext.value }),
      });
      kbstatus.textContent = "submitted";
      kbtext.value = "";
    } catch (err) {
      kbstatus.textContent = "submit failed — " + err;
    } finally {
      kbsubmit.disabled = false;
    }
  };

  const askq = document.getElementById("askq");
  const askbtn = document.getElementById("askbtn");
  const ragout = document.getElementById("ragout");
  askbtn.onclick = async () => {
    const query = askq.value.trim();
    if (!query) return;
    askbtn.disabled = true;
    ragout.textContent = "…";
    try {
      const r = await fetch("/api/ask", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sid, query: askq.value }),
      });
      const data = await r.json();
      ragout.textContent = data.reply ?? ("error: " + JSON.stringify(data));
    } catch (err) {
      ragout.textContent = "request failed — " + err;
    } finally {
      askbtn.disabled = false;
    }
  };

  const m4status = document.getElementById("m4status");
  async function submitM4(findingType, value) {
    const r = await fetch("/submit/m4", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: sid, finding_type: findingType, value: value }),
    });
    const data = await r.json();
    return data.correct;
  }
  document.getElementById("m4hashbtn").onclick = async () => {
    const btn = document.getElementById("m4hashbtn");
    btn.disabled = true;
    try {
      const correct = await submitM4("malicious_artifact", document.getElementById("m4hash").value);
      m4status.textContent = "artifact: " + (correct ? "correct" : "incorrect");
    } catch (err) {
      m4status.textContent = "artifact: request failed — " + err;
    } finally {
      btn.disabled = false;
    }
  };
  document.getElementById("m4pkgbtn").onclick = async () => {
    const btn = document.getElementById("m4pkgbtn");
    btn.disabled = true;
    try {
      const correct = await submitM4("vulnerable_dependency", document.getElementById("m4pkg").value);
      m4status.textContent = "package: " + (correct ? "correct" : "incorrect");
    } catch (err) {
      m4status.textContent = "package: request failed — " + err;
    } finally {
      btn.disabled = false;
    }
  };
</script>
