services:
  web:
    build: .
    ports: ["8000:8000"]
    environment:
      HALCYON_MODE: ${HALCYON_MODE:-vulnerable}
      DATABASE_URL: postgresql://halcyon:halcyon@db:5432/halcyon
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      DEFAULT_PROVIDER: local
      MCP_CORE_URL: http://mcp-core-banking:9001/mcp
      MCP_CRM_URL: http://mcp-crm:9002/mcp
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
      mcp-core-banking:
        condition: service_started
      mcp-crm:
        condition: service_started
  mcp-core-banking:
    build: .
    command: uv run uvicorn halcyon.mcp_deploy:CORE_ASGI --host 0.0.0.0 --port 9001
    environment:
      HALCYON_MODE: ${HALCYON_MODE:-vulnerable}
  mcp-crm:
    build: .
    command: uv run uvicorn halcyon.mcp_deploy:CRM_ASGI --host 0.0.0.0 --port 9002
    environment:
      HALCYON_MODE: ${HALCYON_MODE:-vulnerable}
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: halcyon
      POSTGRES_PASSWORD: halcyon
      POSTGRES_DB: halcyon
    volumes: ["pgdata:/var/lib/postgresql/data"]
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U halcyon -d halcyon"]
      interval: 2s
      timeout: 3s
      retries: 20
  ollama:
    image: ollama/ollama:latest
    volumes: ["ollama:/root/.ollama"]
    ports: ["11434:11434"]
volumes:
  pgdata:
  ollama:
